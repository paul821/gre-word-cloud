<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRE Word Cloud</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;width:100vw;height:100vh;user-select:none}
#world{position:absolute;transform-origin:0 0;will-change:transform}
.cluster-group{position:absolute}
.cluster-bg{border-radius:50%;opacity:.08;position:absolute;cursor:pointer;transition:opacity .2s}
.cluster-bg:hover{opacity:.15}
.cluster-label{position:absolute;text-align:center;font-size:11px;color:#8b949e;letter-spacing:.5px;text-transform:uppercase;pointer-events:none;white-space:nowrap}
.word-bubble{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:transform .18s,box-shadow .18s,opacity .3s;font-weight:600;line-height:1.15;padding:4px}
.word-bubble:hover{transform:scale(1.18)!important;z-index:100!important}
.word-bubble.src-Y{background:rgba(250,204,21,.12);border:2px solid rgba(250,204,21,.55);color:#fde68a}
.word-bubble.src-R{background:rgba(248,113,113,.10);border:2px dashed rgba(248,113,113,.55);color:#fca5a5}
.word-bubble.src-RA{background:rgba(192,132,252,.10);border:2px dashed rgba(192,132,252,.55);color:#d8b4fe}
.word-bubble.faded{opacity:.08!important}
.word-bubble.highlighted{box-shadow:0 0 18px 4px rgba(99,102,241,.7)!important;transform:scale(1.15)!important;z-index:99!important}

#legend{position:fixed;top:18px;left:18px;z-index:200;background:rgba(22,27,34,.92);border:1px solid #30363d;border-radius:12px;padding:14px 18px;font-size:13px;backdrop-filter:blur(8px)}
#legend h3{font-size:13px;margin-bottom:10px;color:#8b949e;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.legend-item{display:flex;align-items:center;gap:10px;margin:7px 0}
.legend-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.legend-dot.y-dot{background:rgba(250,204,21,.15);border:2px solid rgba(250,204,21,.6)}
.legend-dot.r-dot{background:rgba(248,113,113,.12);border:2px dashed rgba(248,113,113,.6)}
.legend-dot.ra-dot{background:rgba(192,132,252,.12);border:2px dashed rgba(192,132,252,.6)}

#search-box{position:fixed;top:18px;right:18px;z-index:200}
#search-box input{background:rgba(22,27,34,.92);border:1px solid #30363d;border-radius:10px;padding:10px 16px;color:#e6edf3;font-size:14px;width:240px;outline:none;backdrop-filter:blur(8px)}
#search-box input::placeholder{color:#484f58}
#search-box input:focus{border-color:#58a6ff}

#controls{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:200;display:flex;gap:8px;background:rgba(22,27,34,.92);border:1px solid #30363d;border-radius:12px;padding:8px 14px;backdrop-filter:blur(8px)}
.ctrl-btn{background:rgba(110,118,129,.15);border:1px solid #30363d;border-radius:8px;padding:7px 16px;color:#8b949e;font-size:12px;cursor:pointer;transition:all .2s;font-weight:500;letter-spacing:.3px}
.ctrl-btn:hover,.ctrl-btn.active{background:rgba(56,189,248,.18);border-color:#58a6ff;color:#58a6ff}

#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
#modal-overlay.show{display:flex}
#modal{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:28px 32px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;position:relative}
#modal h2{font-size:20px;margin-bottom:4px;color:#e6edf3}
#modal .modal-meaning{font-size:14px;color:#8b949e;margin-bottom:18px;font-style:italic}
#modal .word-chips{display:flex;flex-wrap:wrap;gap:8px}
.word-chip{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .2s;font-weight:500}
.word-chip:hover{transform:scale(1.08)}
.word-chip.src-Y{background:rgba(250,204,21,.12);border:1px solid rgba(250,204,21,.4);color:#fde68a}
.word-chip.src-R{background:rgba(248,113,113,.10);border:1px dashed rgba(248,113,113,.4);color:#fca5a5}
.word-chip.src-RA{background:rgba(192,132,252,.10);border:1px dashed rgba(192,132,252,.4);color:#d8b4fe}
#modal .word-def{margin-top:14px;padding:12px 16px;background:rgba(110,118,129,.08);border-radius:10px;font-size:14px;color:#c9d1d9;display:none;line-height:1.5}
#modal-close{position:absolute;top:14px;right:18px;background:none;border:none;color:#8b949e;font-size:22px;cursor:pointer}
#modal-close:hover{color:#e6edf3}

#tooltip{position:fixed;z-index:250;background:rgba(22,27,34,.95);border:1px solid #30363d;border-radius:10px;padding:10px 14px;font-size:13px;pointer-events:none;display:none;max-width:280px;line-height:1.4;color:#c9d1d9;backdrop-filter:blur(6px)}
#tooltip .tt-word{font-weight:700;color:#e6edf3;margin-bottom:4px;font-size:14px}

@media(max-width:768px){
  .cluster-label{font-size:9px;letter-spacing:.3px}
  #legend{top:10px;left:10px;padding:10px 13px;border-radius:10px;font-size:11px;max-width:52vw}
  #legend h3{font-size:11px;margin-bottom:6px}
  .legend-item{gap:6px;margin:4px 0;font-size:11px}
  .legend-dot{width:12px;height:12px}
  #search-box{top:10px;right:10px}
  #search-box input{width:38vw;min-width:120px;font-size:13px;padding:8px 12px;border-radius:8px}
  #controls{bottom:10px;padding:6px 10px;gap:5px;border-radius:10px;flex-wrap:wrap;justify-content:center;max-width:96vw}
  .ctrl-btn{padding:5px 10px;font-size:11px}
  #modal{padding:20px 22px;max-width:92vw;border-radius:12px}
  #modal h2{font-size:17px}
  #modal .modal-meaning{font-size:13px;margin-bottom:12px}
  .word-chip{padding:5px 10px;font-size:12px}
  #modal .word-def{padding:10px 12px;font-size:13px}
  #tooltip{max-width:220px;padding:8px 10px;font-size:12px}
  #tooltip .tt-word{font-size:13px}
}
@media(max-width:480px){
  #legend{top:8px;left:8px;padding:8px 10px;font-size:10px}
  #legend h3{font-size:10px;margin-bottom:4px}
  .legend-item{gap:5px;margin:3px 0;font-size:10px}
  .legend-dot{width:10px;height:10px}
  #search-box{top:auto;bottom:56px;right:8px;left:8px}
  #search-box input{width:100%;font-size:13px;padding:9px 12px}
  #controls{bottom:8px;padding:5px 8px;gap:4px}
  .ctrl-btn{padding:5px 8px;font-size:10px}
  #modal{padding:16px 18px;max-width:96vw}
  #tooltip{max-width:180px}
}
</style>
</head>

// ── Layout ──
const world = document.getElementById("world");
const GOLDEN = 2.39996322973;
let bubbles = [];

// Responsive scale factor: shrink bubbles/clusters on small screens
const vMin = Math.min(window.innerWidth, window.innerHeight);
const responsiveScale = vMin < 480 ? 0.52 : vMin < 768 ? 0.68 : vMin < 1024 ? 0.82 : 1;

function bubbleSize(word) {
  const len = word.length;
  let base;
  if (len <= 4) base = 62;
  else if (len <= 6) base = 68;
  else if (len <= 8) base = 74;
  else if (len <= 10) base = 80;
  else base = 88;
  return Math.round(base * responsiveScale);
}

function fontSize(word) {
  const len = word.length;
  let base;
  if (len <= 4) base = 13;
  else if (len <= 7) base = 12;
  else if (len <= 10) base = 11;
  else base = 10;
  return Math.max(8, Math.round(base * responsiveScale));
}

function packCircles(words) {
  const positions = [];
  for (let i = 0; i < words.length; i++) {
    const r = bubbleSize(words[i][0]) / 2;
    if (i === 0) { positions.push({x:0,y:0,r}); continue; }
    const angle = i * GOLDEN;
    let dist = r * 1.1;
    let placed = false;
    for (let attempt = 0; attempt < 200 && !placed; attempt++) {
      const x = Math.cos(angle) * dist;
      const y = Math.sin(angle) * dist;
      let overlap = false;
      for (const p of positions) {
        const dx = x - p.x, dy = y - p.y;
        if (Math.sqrt(dx*dx+dy*dy) < r + p.r + 4) { overlap = true; break; }
      }
      if (!overlap) { positions.push({x,y,r}); placed = true; }
      else dist += 3;
    }
    if (!placed) positions.push({x: Math.cos(angle)*dist, y: Math.sin(angle)*dist, r});
  }
  return positions;
}

// Position clusters in a spiral
const clusterPositions = [];
const spiralStep = Math.round(320 * responsiveScale);
for (let i = 0; i < DATA.length; i++) {
  const angle = i * GOLDEN;
  const dist = (i === 0) ? 0 : spiralStep * Math.sqrt(i);
  clusterPositions.push({ x: Math.cos(angle) * dist, y: Math.sin(angle) * dist });
}

// Find global bounds
let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

DATA.forEach((cluster, ci) => {
  const cx = clusterPositions[ci].x;
  const cy = clusterPositions[ci].y;
  const positions = packCircles(cluster.words);
  
  // Cluster background
  let cMaxR = 0;
  positions.forEach(p => { const d = Math.sqrt(p.x*p.x+p.y*p.y)+p.r; if(d>cMaxR) cMaxR=d; });
  const bgR = cMaxR + Math.round(30 * responsiveScale);
  
  const group = document.createElement("div");
  group.className = "cluster-group";
  group.style.left = (cx - bgR) + "px";
  group.style.top = (cy - bgR) + "px";
  group.style.width = (bgR*2) + "px";
  group.style.height = (bgR*2) + "px";
  
  const bg = document.createElement("div");
  bg.className = "cluster-bg";
  bg.style.width = bg.style.height = (bgR*2) + "px";
  bg.style.background = cluster.color;
  bg.dataset.ci = ci;
  bg.addEventListener("click", () => { if (!dragMoved) showModal(ci); });
  group.appendChild(bg);
  
  const label = document.createElement("div");
  label.className = "cluster-label";
  label.textContent = cluster.name;
  label.style.left = "50%";
  label.style.top = (bgR*2 + 8) + "px";
  label.style.transform = "translateX(-50%)";
  group.appendChild(label);
  
  positions.forEach((p, wi) => {
    const w = cluster.words[wi];
    const size = bubbleSize(w[0]);
    const bub = document.createElement("div");
    bub.className = "word-bubble src-" + w[2];
    bub.style.width = bub.style.height = size + "px";
    bub.style.left = (bgR + p.x - size/2) + "px";
    bub.style.top = (bgR + p.y - size/2) + "px";
    bub.style.fontSize = fontSize(w[0]) + "px";
    bub.textContent = w[0];
    bub.dataset.word = w[0].toLowerCase();
    bub.dataset.def = w[1];
    bub.dataset.src = w[2];
    bub.dataset.ci = ci;
    bub.addEventListener("mouseenter", showTooltip);
    bub.addEventListener("mouseleave", hideTooltip);
    bub.addEventListener("click", e => { e.stopPropagation(); if (!dragMoved) showWordInModal(ci, wi); });
    group.appendChild(bub);
    bubbles.push(bub);
    
    const gx = cx + p.x, gy = cy + p.y;
    if(gx - size/2 < minX) minX = gx - size/2;
    if(gy - size/2 < minY) minY = gy - size/2;
    if(gx + size/2 > maxX) maxX = gx + size/2;
    if(gy + size/2 > maxY) maxY = gy + size/2;
  });
  
  world.appendChild(group);
});

// ── Pan & Zoom ──
let scale = 1, panX = 0, panY = 0, dragging = false, dragStartX, dragStartY, startPanX, startPanY;
const canvasPad = Math.round(200 * responsiveScale);
const W = maxX - minX + canvasPad, H = maxY - minY + canvasPad;

function fitView() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const fitScale = vMin < 480 ? 0.95 : vMin < 768 ? 0.92 : 0.85;
  scale = Math.min(vw / W, vh / H, 1) * fitScale;
  panX = (vw - W * scale) / 2 - minX * scale;
  panY = (vh - H * scale) / 2 - minY * scale;
  applyTransform();
}

function applyTransform() {
  world.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
}

fitView();
window.addEventListener("resize", fitView);

let dragMoved = false;
document.addEventListener("mousedown", e => {
  if (e.target.closest("#legend,#search-box,#controls,#modal-overlay")) return;
  dragging = true; dragMoved = false;
  dragStartX = e.clientX; dragStartY = e.clientY;
  startPanX = panX; startPanY = panY; document.body.style.cursor = "grabbing";
  e.preventDefault();
});
document.addEventListener("mousemove", e => {
  if (!dragging) return;
  const dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
  panX = startPanX + dx; panY = startPanY + dy;
  applyTransform();
});
document.addEventListener("mouseup", () => { dragging = false; document.body.style.cursor = ""; });

// Touch support for mobile
let lastTouchDist = 0;
document.addEventListener("touchstart", e => {
  if (e.target.closest("#legend,#search-box,#controls,#modal-overlay")) return;
  if (e.touches.length === 1) {
    dragging = true; dragMoved = false;
    dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    startPanX = panX; startPanY = panY;
  } else if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
  }
}, {passive: false});
document.addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    const dx = e.touches[0].clientX - dragStartX, dy = e.touches[0].clientY - dragStartY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
    panX = startPanX + dx; panY = startPanY + dy;
    applyTransform();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    if (lastTouchDist > 0) {
      const mid = {x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2};
      const factor = dist / lastTouchDist;
      const newScale = Math.max(0.1, Math.min(3, scale * factor));
      panX = mid.x - (mid.x - panX) * (newScale / scale);
      panY = mid.y - (mid.y - panY) * (newScale / scale);
      scale = newScale; applyTransform();
    }
    lastTouchDist = dist;
  }
}, {passive: false});
document.addEventListener("touchend", () => { dragging = false; lastTouchDist = 0; });

window.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const rect = world.getBoundingClientRect();
  const mx = e.clientX, my = e.clientY;
  const newScale = Math.max(0.1, Math.min(3, scale * factor));
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, {passive: false});

// ── Tooltip ──
const tooltip = document.getElementById("tooltip");
function showTooltip(e) {
  const b = e.target;
  tooltip.querySelector(".tt-word").textContent = b.dataset.word;
  tooltip.querySelector(".tt-def").textContent = b.dataset.def;
  tooltip.style.display = "block";
  const r = b.getBoundingClientRect();
  tooltip.style.left = Math.min(r.left, window.innerWidth - 290) + "px";
  tooltip.style.top = (r.top - tooltip.offsetHeight - 8) + "px";
  if (parseFloat(tooltip.style.top) < 0) tooltip.style.top = (r.bottom + 8) + "px";
}
function hideTooltip() { tooltip.style.display = "none"; }

function showModal(ci) {
  const c = DATA[ci];
  modalTitle.textContent = c.name;
  modalMeaning.textContent = c.meaning;
  modalChips.innerHTML = "";
  modalDef.style.display = "none";
  c.words.forEach((w, wi) => {
    const chip = document.createElement("span");
    chip.className = "word-chip src-" + w[2];
    chip.textContent = w[0];
    chip.addEventListener("click", () => {
      modalDef.textContent = w[0] + ": " + w[1];
      modalDef.style.display = "block";
    });
    modalChips.appendChild(chip);
  });
  overlay.classList.add("show");
}

function showWordInModal(ci, wi) {
  showModal(ci);
  const w = DATA[ci].words[wi];
  modalDef.textContent = w[0] + ": " + w[1];
  modalDef.style.display = "block";
}

document.getElementById("modal-close").addEventListener("click", () => overlay.classList.remove("show"));
overlay.addEventListener("click", e => { if (e.target === overlay) overlay.classList.remove("show"); });

// ── Search ──
const searchInput = document.getElementById("search");
searchInput.addEventListener("input", () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) { bubbles.forEach(b => { b.classList.remove("faded","highlighted"); }); return; }
  bubbles.forEach(b => {
    const match = b.dataset.word.includes(q) || b.dataset.def.toLowerCase().includes(q);
    b.classList.toggle("highlighted", match);
    b.classList.toggle("faded", !match);
  });
});

// ── Filter ──
document.querySelectorAll(".ctrl-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".ctrl-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const f = btn.dataset.filter;
    bubbles.forEach(b => {
      if (f === "all") { b.style.display = ""; }
      else { b.style.display = b.dataset.src === f ? "" : "none"; }
    });
  });
});
</script>
</body>
</html>
